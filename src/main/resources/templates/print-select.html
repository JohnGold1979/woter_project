<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Отчеты - Водоканал</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/print.css">
</head>
<body class="d-flex flex-column vh-100">

<!-- Навигационное меню -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">💧 Водоканал - Отчеты</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Меню">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="/">Главная</a></li>
            </ul>
            <div class="d-flex">
                <a class="btn btn-outline-light btn-sm me-2" href="/profile">Профиль</a>
                <a class="btn btn-danger btn-sm" href="/logout">Выход</a>
            </div>
        </div>
    </div>
</nav>

<!-- Установка периода -->
<div class="bg-light border-bottom p-2">
    <div class="d-flex align-items-center">
        <div class="col-auto">
            <label class="form-label">Месяц</label>
            <select id="monthSelect" class="form-select">
                <option th:each="m,iterStat : ${months}"
                        th:value="${iterStat.index + 1}"
                        th:text="${m}"
                        th:selected="${(iterStat.index + 1) == selectedMonth}"></option>
            </select>
        </div>
        <div class="col-auto">
            <label class="form-label">Год</label>
            <select id="yearSelect" class="form-select">
                <option th:each="y : ${years}" th:value="${y}" th:text="${y}"
                        th:selected="${y == selectedYear}"></option>
            </select>
        </div>
    </div>
</div>

<!-- Основное рабочее окно -->
<div class="d-flex flex-grow-1">
    <div class="sidebar bg-light border-end p-2">
        <div class="p-3 border-bottom">
            <h5 class="fw-bold text-primary mb-0"><i class="fa-solid fa-droplet"></i> Водоканал</h5>
        </div>
        <ul class="nav flex-column mt-2">
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/clients">
                    <i class="fa-solid fa-users me-2 text-primary"></i> Клиенты Бишкек
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/stations">
                    <i class="fa-solid fa-water me-2 text-info"></i> Станции
                </a>
            </li>
            <li class="nav-item mt-2 border-top pt-2 text-muted small px-3">Финансы</li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/saldo">
                    <i class="fa-solid fa-scale-balanced me-2 text-success"></i> Сальдо
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/pay">
                    <i class="fa-solid fa-credit-card me-2 text-success"></i> Оплаты
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/subsidy">
                    <i class="fa-solid fa-hand-holding-dollar me-2 text-warning"></i> Субсидии
                </a>
            </li>

            <li class="nav-item mt-2 border-top pt-2 text-muted small px-3">Учёт</li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/indications">
                    <i class="fa-solid fa-gauge me-2 text-danger"></i> Показания
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/print/select">
                    <i class="fa-solid fa-file-lines me-2 text-primary"></i> Отчёты
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link d-flex align-items-center py-2 px-3 text-secondary" href="/events">
                    <i class="fa-solid fa-bell me-2 text-secondary"></i> События
                </a>
            </li>
        </ul>
    </div>

    <div class="container">
        <h4>Печать квитанций и отчётов</h4>

        <form id="printForm" method="get" class="row g-2 align-items-end">
            <!-- скрытые поля для передачи периода -->
            <input type="hidden" name="month" id="hiddenMonth">
            <input type="hidden" name="year" id="hiddenYear">

            <!-- Блок квитанций -->
            <div class="col-12 mt-3">
                <h5>Квитанции</h5>
                <div class="d-grid gap-2">
                    <button type="submit" th:formaction="@{/print/apartment}" formtarget="_blank" class="btn btn-primary">
                        Квартирный сектор
                    </button>
                    <button type="submit" th:formaction="@{/print/private}" formtarget="_blank" class="btn btn-primary">
                        Частный сектор
                    </button>
                    <button type="submit" th:formaction="@{/print/indications}" formtarget="_blank" class="btn btn-primary">
                        Водомеры
                    </button>
                </div>
            </div>

            <!-- Блок отчётов -->
            <div class="col-12 mt-4">
                <h5>Отчёты</h5>
                <div class="d-grid gap-2">
                    <button type="submit" th:formaction="@{/report/house}" formtarget="_blank" class="btn btn-success">
                        По лицевым счетам (квартирный сектор)
                    </button>
                    <button type="submit" th:formaction="@{/report/private}" formtarget="_blank" class="btn btn-success">
                        По лицевым счетам (частный сектор)
                    </button>
                    <button type="submit" th:formaction="@{/report/sounters}" formtarget="_blank" class="btn btn-success">
                        По водомерам
                    </button>
                    <br>
                    <button type="submit" th:formaction="@{/report/housesall}" formtarget="_blank" class="btn btn-success">
                        По домам
                    </button>
                    <button type="submit" th:formaction="@{/report/streetall}" formtarget="_blank" class="btn btn-success">
                        По улицам
                    </button>
                    <button type="submit" th:formaction="@{/report/payall}" formtarget="_blank" class="btn btn-success">
                        Отчет по оплатам
                    </button>
                    <button type="submit" th:formaction="@{/report/streetall}" formtarget="_blank" class="btn btn-success">
                       Дислокакия по домам
                    </button>
                </div>
            </div>
        </form>

        <div class="mt-3">
            <a href="/clients" class="btn btn-secondary">Отмена</a>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/printSelect.js"></script>

</body>
</html>
