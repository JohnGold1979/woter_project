<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в систему учета воды</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #1a73e8;
      --primary-dark: #0d47a1;
      --accent-color: #00bcd4;
      --water-blue: #4fc3f7;
      --light-blue: #e1f5fe;
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray: #9e9e9e;
      --gray-dark: #424242;
      --error: #f44336;
      --success: #4caf50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--light-blue) 0%, var(--water-blue) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Анимированные водные волны на фоне */
    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%234fc3f7" fill-opacity="0.3" d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,197.3C1248,203,1344,149,1392,122.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
      background-size: cover;
      z-index: -1;
      opacity: 0.7;
    }

    .wave:nth-child(2) {
      bottom: 10px;
      animation: wave 10s linear infinite;
      opacity: 0.5;
    }

    .wave:nth-child(3) {
      bottom: 15px;
      animation: wave 15s linear infinite;
      opacity: 0.2;
    }

    @keyframes wave {
      0% {
        background-position-x: 0;
      }
      100% {
        background-position-x: 1440px;
      }
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      z-index: 10;
    }

    .register-btn {
      position: absolute;
      top: -50px;
      right: 0;
      font-size: 16px;
      background: var(--white);
      border: 2px solid var(--primary-color);
      border-radius: 30px;
      color: var(--primary-color);
      cursor: pointer;
      padding: 10px 20px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 20;
    }

    .register-btn:hover {
      background: var(--primary-color);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .login-box {
      background: var(--white);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
    }

    .water-drop {
      position: absolute;
      top: -20px;
      right: 30px;
      font-size: 40px;
      color: var(--water-blue);
      transform: rotate(15deg);
    }

    .login-box h2 {
      margin-bottom: 30px;
      color: var(--primary-dark);
      font-size: 28px;
      position: relative;
      display: inline-block;
    }

    .login-box h2::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--gray-dark);
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .input-group input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      background-color: var(--gray-light);
    }

    .input-group input:focus {
      border-color: var(--primary-color);
      background-color: var(--white);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
      outline: none;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      bottom: 15px;
      color: var(--gray);
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .input-group input:focus + i {
      color: var(--primary-color);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26, 115, 232, 0.4);
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .message.error {
      background-color: rgba(244, 67, 54, 0.1);
      color: var(--error);
      border-left: 4px solid var(--error);
    }

    .message.success {
      background-color: rgba(76, 175, 80, 0.1);
      color: var(--success);
      border-left: 4px solid var(--success);
    }

    .forgot-password {
      margin-top: 20px;
      font-size: 14px;
      color: var(--gray-dark);
    }

    .forgot-password a {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Адаптивность */
    @media (max-width: 480px) {
      .login-box {
        padding: 30px 20px;
      }

      .register-btn {
        position: relative;
        top: 0;
        right: 0;
        margin-bottom: 20px;
        width: 100%;
      }

      .container {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- Волны на фоне -->
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="container">

  <!-- Кнопка регистрации -->
  <form th:action="@{/register}" method="post" th:object="${user}">
    <button type="submit" class="register-btn">
      <i class="fas fa-user-plus"></i> Регистрация
    </button>
  </form>

  <!-- Форма входа -->
  <div class="login-box">
    <div class="water-drop">
      <i class="fas fa-tint"></i>
    </div>

    <h2>Вход в систему</h2>

    <form th:action="@{/login}" method="post">
      <div class="input-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" required placeholder="Введите ваш логин">
        <i class="fas fa-user"></i>
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required placeholder="Введите ваш пароль">
        <i class="fas fa-lock"></i>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Войти
      </button>
    </form>

    <div class="forgot-password">
      <a href="#">Забыли пароль?</a>
    </div>

    <!-- Сообщения -->
    <div class="message error" th:if="${error}">
      <i class="fas fa-exclamation-circle"></i> [[${error}]]
    </div>
    <div class="message success" th:if="${success}">
      <i class="fas fa-check-circle"></i> [[${success}]]
    </div>
  </div>
</div>

<script>
  // Простая анимация для улучшения UX
  document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('input');

    inputs.forEach(input => {
      // Анимация при фокусе
      input.addEventListener('focus', function() {
        this.parentElement.querySelector('label').style.color = '#1a73e8';
      });

      input.addEventListener('blur', function() {
        if (!this.value) {
          this.parentElement.querySelector('label').style.color = '#424242';
        }
      });
    });
  });
</script>

</body>
</html>
